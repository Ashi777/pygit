<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyGit Visualizer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; }
    #repo-path { font-size: 11px; color: #848d97; font-family: monospace; }
    .legend {
      margin-left: auto;
      display: flex;
      gap: 18px;
      align-items: center;
      font-size: 12px;
      color: #848d97;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── Main layout ─────────────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Graph panel ─────────────────────────────────────────── */
    #graph-panel {
      flex: 0 0 62%;
      border-right: 1px solid #30363d;
      position: relative;
      overflow: hidden;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #484f58;
      font-size: 14px;
      pointer-events: none;
    }
    #graph-svg { width: 100%; height: 100%; cursor: grab; display: block; }
    #graph-svg:active { cursor: grabbing; }

    /* SVG elements */
    .edge { fill: none; stroke: #30363d; stroke-width: 1.5; }
    .node-group { cursor: pointer; }
    .node-sha {
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 10px;
      fill: #484f58;
      pointer-events: none;
      user-select: none;
    }
    .pill-text {
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 10px;
      pointer-events: none;
      user-select: none;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #e6edf3;
      pointer-events: none;
      display: none;
      max-width: 280px;
      z-index: 100;
      line-height: 1.4;
    }
    #tooltip .tip-sha { color: #388bfd; font-family: monospace; font-size: 11px; }
    #tooltip .tip-msg { margin-top: 4px; font-weight: 500; }
    #tooltip .tip-author { color: #848d97; font-size: 11px; margin-top: 2px; }

    /* ── Detail panel ────────────────────────────────────────── */
    #detail-panel {
      flex: 1;
      overflow-y: auto;
      background: #0d1117;
    }
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #30363d;
      gap: 10px;
    }
    .placeholder p { font-size: 13px; color: #484f58; }

    .commit-header {
      padding: 16px 20px;
      border-bottom: 1px solid #21262d;
    }
    .commit-sha {
      font-family: monospace;
      font-size: 12px;
      color: #388bfd;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .commit-message {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.5;
      color: #e6edf3;
    }
    .commit-meta { font-size: 12px; color: #848d97; line-height: 1.8; }
    .commit-meta .name { color: #e6edf3; }

    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-family: monospace;
      font-weight: 500;
    }
    .badge-branch { background: #1f3a6e; color: #388bfd; border: 1px solid #1a4a90; }
    .badge-tag    { background: #1a3a2a; color: #3fb950; border: 1px solid #1a5a2a; }
    .badge-merge  { background: #3a200a; color: #f0883e; border: 1px solid #5a3010; }

    .parents-row {
      margin-top: 8px;
      font-size: 12px;
      color: #848d97;
    }
    .parent-link {
      font-family: monospace;
      color: #388bfd;
      cursor: pointer;
      font-size: 12px;
      text-decoration: none;
    }
    .parent-link:hover { text-decoration: underline; }

    .section {
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #484f58;
      margin-bottom: 10px;
    }

    .file-list { list-style: none; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      color: #c9d1d9;
      transition: background 0.1s;
    }
    .file-item:hover { background: #21262d; }
    .file-item.active { background: #1c3461; color: #58a6ff; }
    .file-icon { width: 14px; height: 14px; flex-shrink: 0; color: #484f58; }

    .content-wrap { padding: 14px 20px; }
    .content-filename {
      font-family: monospace;
      font-size: 11px;
      color: #484f58;
      margin-bottom: 8px;
    }
    pre.blob {
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #c9d1d9;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px 16px;
      overflow: auto;
      max-height: 420px;
      white-space: pre;
      tab-size: 4;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<div id="header">
  <svg width="18" height="18" viewBox="0 0 16 16" fill="#f0883e">
    <path d="M15.698 7.287 8.712.302a1.03 1.03 0 0 0-1.457 0l-1.45 1.45 1.84 1.84a1.223 1.223 0 0 1 1.55 1.56l1.773 1.774a1.224 1.224 0 0 1 1.267 2.025 1.226 1.226 0 0 1-2.002-1.334L8.58 5.965v4.334a1.226 1.226 0 1 1-1.006-.45V5.375a1.226 1.226 0 0 1-.665-1.608L5.093 1.937.302 6.727a1.03 1.03 0 0 0 0 1.457l6.986 6.986a1.03 1.03 0 0 0 1.457 0l6.953-6.883z"/>
  </svg>
  <h1>PyGit Visualizer</h1>
  <span id="repo-path"></span>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#388bfd"></div>Commit</div>
    <div class="legend-item"><div class="dot" style="background:#f0883e"></div>Merge</div>
    <div class="legend-item"><div class="dot" style="background:#3fb950"></div>Tagged</div>
  </div>
</div>

<!-- ── Main ──────────────────────────────────────────────────── -->
<div id="main">

  <!-- Graph panel -->
  <div id="graph-panel">
    <div id="loading">Loading commit graph…</div>
    <svg id="graph-svg"></svg>
  </div>

  <!-- Detail panel -->
  <div id="detail-panel">
    <div class="placeholder">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2"  x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="6"  y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
      </svg>
      <p>Click a commit node to inspect it</p>
    </div>
  </div>

</div>

<!-- Hover tooltip -->
<div id="tooltip">
  <div class="tip-sha" id="tip-sha"></div>
  <div class="tip-msg" id="tip-msg"></div>
  <div class="tip-author" id="tip-author"></div>
</div>

<script>
// ================================================================
//  Constants
// ================================================================
const NODE_R   = 6;     // circle radius
const LANE_W   = 34;    // horizontal distance between lanes
const NODE_H   = 58;    // vertical distance between rows
const MARGIN_X = 20;    // left margin
const MARGIN_Y = 36;    // top margin

// ================================================================
//  State
// ================================================================
let graphData  = null;
let selectedSha = null;

// ================================================================
//  Utilities
// ================================================================
function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function shortAuthor(author) {
  // "Name <email> ts tz"  →  "Name <email>"
  const m = author.match(/^(.+?)\s+\d+\s+[+-]\d+$/);
  return m ? m[1] : author;
}

function fmtDate(ts) {
  if (!ts) return "";
  return new Date(ts * 1000).toLocaleString(undefined, {
    year:"numeric", month:"short", day:"numeric",
    hour:"2-digit", minute:"2-digit"
  });
}

// ================================================================
//  Topological sort  (Kahn's, tie-break by timestamp descending)
// ================================================================
function topoSort(nodes, edges) {
  const map      = Object.fromEntries(nodes.map(n => [n.sha, n]));
  const children = Object.fromEntries(nodes.map(n => [n.sha, []])); // sha → child shas
  const parents  = Object.fromEntries(nodes.map(n => [n.sha, []])); // sha → parent shas
  const indeg    = Object.fromEntries(nodes.map(n => [n.sha, 0]));

  for (const e of edges) {
    if (!map[e.source] || !map[e.target]) continue;
    parents[e.source].push(e.target);
    children[e.target].push(e.source);
    indeg[e.target]++;
  }

  // Seeds: nodes with no children (branch/tag tips)
  let frontier = nodes.filter(n => children[n.sha].length === 0);
  frontier.sort((a,b) => b.timestamp - a.timestamp);

  const order = [];
  const seen  = new Set();

  while (frontier.length) {
    frontier.sort((a,b) => b.timestamp - a.timestamp);
    const node = frontier.shift();
    if (seen.has(node.sha)) continue;
    seen.add(node.sha);
    order.push(node);
    for (const pSha of parents[node.sha]) {
      if (seen.has(pSha)) continue;
      indeg[pSha]--;
      if (indeg[pSha] === 0) frontier.push(map[pSha]);
    }
  }

  return { order, parents };
}

// ================================================================
//  Lane assignment  (mirrors git log --graph column logic)
// ================================================================
function assignLanes(order, parents) {
  const shaSet = new Set(order.map(n => n.sha));
  const lanes  = [];            // lanes[i] = SHA expected there (or null = free)
  const info   = {};            // sha → {lane, index}

  for (let i = 0; i < order.length; i++) {
    const sha  = order[i].sha;
    const pars = (parents[sha] || []).filter(p => shaSet.has(p));

    // Find own lane (pre-assigned by a child) or allocate a free one
    let lane = lanes.indexOf(sha);
    if (lane === -1) {
      lane = lanes.indexOf(null);
      if (lane === -1) { lane = lanes.length; lanes.push(null); }
    }
    info[sha] = { lane, index: i };

    // Hand off lane to parents
    if (pars.length === 0) {
      lanes[lane] = null;
    } else {
      lanes[lane] = pars[0];   // first parent continues in this lane
      for (let j = 1; j < pars.length; j++) {
        // Additional parents claim a free lane (avoid duplicating)
        if (!lanes.includes(pars[j])) {
          let nl = lanes.indexOf(null);
          if (nl === -1) { nl = lanes.length; lanes.push(null); }
          lanes[nl] = pars[j];
        }
      }
    }
  }

  const maxLane = Math.max(0, ...Object.values(info).map(d => d.lane));
  return { info, maxLane };
}

// ================================================================
//  Position helpers
// ================================================================
function nodePos(sha, info) {
  const d = info[sha];
  return {
    x: MARGIN_X + d.lane * LANE_W + NODE_R,
    y: MARGIN_Y + d.index * NODE_H,
  };
}

// ================================================================
//  Render graph
// ================================================================
function renderGraph(data) {
  graphData = data;
  document.getElementById("loading").style.display = "none";
  document.getElementById("repo-path").textContent = data.repo || "";

  const svg = d3.select("#graph-svg");
  svg.selectAll("*").remove();

  if (!data.nodes.length) {
    svg.append("text")
      .attr("x", 60).attr("y", 60)
      .attr("fill","#484f58").attr("font-size","13px")
      .text("No commits yet in this repository.");
    return;
  }

  const { order, parents } = topoSort(data.nodes, data.edges);
  const { info, maxLane }  = assignLanes(order, parents);
  const nodeMap = Object.fromEntries(data.nodes.map(n => [n.sha, n]));

  // ── SVG defs: arrowhead marker ──────────────────────────────
  const defs = svg.append("defs");
  defs.append("marker")
    .attr("id","arrow")
    .attr("viewBox","0 -4 8 8")
    .attr("refX",7).attr("refY",0)
    .attr("markerWidth",5).attr("markerHeight",5)
    .attr("orient","auto")
    .append("path")
    .attr("d","M0,-4L8,0L0,4")
    .attr("fill","#30363d");

  // ── Root group (zoom target) ────────────────────────────────
  const g = svg.append("g").attr("id","viewport");

  svg.call(
    d3.zoom()
      .scaleExtent([0.15, 5])
      .on("zoom", ev => g.attr("transform", ev.transform))
  );

  // ── Edges ───────────────────────────────────────────────────
  const edgeG = g.append("g").attr("class","edges");

  for (const node of order) {
    const sha = node.sha;
    if (!info[sha]) continue;
    const p = nodePos(sha, info);

    for (const parentSha of (parents[sha] || [])) {
      if (!info[parentSha]) continue;
      const pp = nodePos(parentSha, info);

      let pathD;
      if (p.x === pp.x) {
        // Same lane → straight vertical
        pathD = `M${p.x},${p.y + NODE_R} L${pp.x},${pp.y - NODE_R - 5}`;
      } else {
        // Different lanes → cubic bezier S-curve
        const cy1 = p.y  + NODE_H * 0.55;
        const cy2 = pp.y - NODE_H * 0.55;
        pathD = `M${p.x},${p.y + NODE_R} `
              + `C${p.x},${cy1} ${pp.x},${cy2} ${pp.x},${pp.y - NODE_R - 5}`;
      }

      edgeG.append("path")
        .attr("class","edge")
        .attr("d", pathD)
        .attr("marker-end","url(#arrow)");
    }
  }

  // ── Nodes ───────────────────────────────────────────────────
  const nodeG = g.append("g").attr("class","nodes");
  const tip   = document.getElementById("tooltip");

  for (const node of order) {
    const sha  = node.sha;
    if (!info[sha]) continue;
    const p     = nodePos(sha, info);
    const color = node.is_merge ? "#f0883e"
                : node.tags.length ? "#3fb950"
                : "#388bfd";

    const ng = nodeG.append("g")
      .attr("class","node-group")
      .attr("transform",`translate(${p.x},${p.y})`)
      .on("click", () => selectCommit(sha))
      .on("mouseenter", function(ev) {
        // Show tooltip
        document.getElementById("tip-sha").textContent  = sha.slice(0,12);
        document.getElementById("tip-msg").textContent  = node.message.split("\n")[0].slice(0,60);
        document.getElementById("tip-author").textContent = shortAuthor(node.author);
        tip.style.display = "block";
        moveTip(ev);
        // Enlarge circle
        d3.select(this).select(".main-circle").attr("r", NODE_R + 2);
      })
      .on("mousemove", moveTip)
      .on("mouseleave", function() {
        tip.style.display = "none";
        if (sha !== selectedSha)
          d3.select(this).select(".main-circle").attr("r", NODE_R);
      });

    // Selection ring (initially invisible)
    ng.append("circle")
      .attr("class","sel-ring")
      .attr("r", NODE_R + 4)
      .attr("fill","none")
      .attr("stroke", color)
      .attr("stroke-width", 2)
      .attr("opacity", 0)
      .attr("id", `ring-${sha}`);

    // Main node circle
    ng.append("circle")
      .attr("class","main-circle")
      .attr("r", NODE_R)
      .attr("fill", color)
      .attr("stroke","#0d1117")
      .attr("stroke-width", 2);

    // Short SHA to the right
    ng.append("text")
      .attr("class","node-sha")
      .attr("x", NODE_R + 7)
      .attr("y", 4)
      .text(node.short_sha);

    // Branch / tag pills
    let pillX = NODE_R + 50;

    for (const branch of node.branches) {
      pillX = addPill(ng, branch, pillX, "#388bfd", "#1f3a6e", "#1a4a90");
    }
    for (const tag of node.tags) {
      pillX = addPill(ng, tag, pillX, "#3fb950", "#1a3a2a", "#1a5a2a");
    }
  }

  // ── Initial zoom-to-fit ─────────────────────────────────────
  const svgEl  = document.getElementById("graph-svg");
  const svgW   = svgEl.clientWidth;
  const svgH   = svgEl.clientHeight;
  const totalW = MARGIN_X * 2 + (maxLane + 1) * LANE_W + 180;
  const totalH = MARGIN_Y * 2 + order.length * NODE_H;
  const scale  = Math.min(1, svgW / totalW, svgH / totalH, 1.4);
  const tx     = (svgW - totalW * scale) / 2;
  const ty     = 16;

  svg.call(
    d3.zoom().transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
  g.attr("transform", `translate(${tx},${ty}) scale(${scale})`);
}

// Helper: add a coloured pill label, return new x position
function addPill(parent, label, x, textColor, bgColor, borderColor) {
  const CHAR_W  = 6.5;
  const PAD     = 7;
  const H       = 14;
  const w       = label.length * CHAR_W + PAD * 2;

  const pg = parent.append("g").attr("transform",`translate(${x},-7)`);
  pg.append("rect")
    .attr("width", w).attr("height", H)
    .attr("rx", 3).attr("ry", 3)
    .attr("fill", bgColor)
    .attr("stroke", borderColor)
    .attr("stroke-width", 0.5);
  pg.append("text")
    .attr("class","pill-text")
    .attr("x", PAD).attr("y", H - 4)
    .attr("fill", textColor)
    .text(label);

  return x + w + 4;
}

function moveTip(ev) {
  const tip = document.getElementById("tooltip");
  tip.style.left = (ev.clientX + 14) + "px";
  tip.style.top  = (ev.clientY - 10) + "px";
}

// ================================================================
//  Select commit → populate detail panel
// ================================================================
function selectCommit(sha) {
  // Update selection rings
  d3.selectAll(".sel-ring").attr("opacity", 0);
  d3.select(`#ring-${sha}`).attr("opacity", 1);
  // Keep node enlarged
  if (selectedSha && selectedSha !== sha) {
    d3.selectAll(".main-circle")
      .filter(function() {
        return d3.select(this.parentNode).attr("transform").includes("ring-" + selectedSha) === false;
      })
      .attr("r", NODE_R);
  }
  selectedSha = sha;

  const panel = document.getElementById("detail-panel");
  panel.innerHTML = `<div style="padding:20px;color:#484f58;font-size:13px">Loading…</div>`;

  fetch(`/api/commit/${sha}`)
    .then(r => r.json())
    .then(renderDetail)
    .catch(e => {
      panel.innerHTML = `<div style="padding:20px;color:#f85149">${esc(e.message)}</div>`;
    });
}

// ================================================================
//  Render commit detail
// ================================================================
function renderDetail(data) {
  const panel = document.getElementById("detail-panel");

  // Find node info from graph data
  const node = graphData?.nodes.find(n => n.sha === data.sha);
  const branches = node?.branches || [];
  const tags     = node?.tags     || [];
  const isMerge  = node?.is_merge || false;
  const ts       = node?.timestamp || 0;

  // Parse author
  const authorStr = shortAuthor(data.author);
  const dateStr   = fmtDate(ts);

  // Badges
  let badgesHtml = "";
  for (const b of branches)
    badgesHtml += `<span class="badge badge-branch">${esc(b)}</span>`;
  for (const t of tags)
    badgesHtml += `<span class="badge badge-tag">${esc(t)}</span>`;
  if (isMerge)
    badgesHtml += `<span class="badge badge-merge">merge commit</span>`;

  // Parents
  let parentsHtml = "";
  if (data.parents.length) {
    const links = data.parents
      .map(p => `<span class="parent-link" onclick="selectCommit('${p}')">${p.slice(0,7)}</span>`)
      .join("  ");
    parentsHtml = `<div class="parents-row">Parents: ${links}</div>`;
  }

  // File list
  const fileItems = (data.entries || []).map(e => `
    <li class="file-item"
        onclick="loadBlob('${esc(e.sha)}','${esc(e.path)}')"
        data-sha="${esc(e.sha)}">
      <svg class="file-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M3.75 1.5a.25.25 0 0 0-.25.25v11.5c0 .138.112.25.25.25h8.5a.25.25
          0 0 0 .25-.25V6H9.75A1.75 1.75 0 0 1 8 4.25V1.5zm5.75.56v2.19c0
          .138.112.25.25.25h2.19zm-7.5-.81A1.75 1.75 0 0 1 3.75 0h5.086c.464 0
          .909.184 1.237.513l3.414 3.414c.329.328.513.773.513 1.237v8.086A1.75
          1.75 0 0 1 12.25 15h-8.5A1.75 1.75 0 0 1 2 13.25z"/>
      </svg>
      ${esc(e.path)}
    </li>`).join("");

  panel.innerHTML = `
    <div class="commit-header">
      <div class="commit-sha">${esc(data.sha)}</div>
      ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ""}
      <div class="commit-message">${esc(data.message)}</div>
      <div class="commit-meta">
        <div><span class="name">${esc(authorStr)}</span></div>
        ${dateStr ? `<div>${esc(dateStr)}</div>` : ""}
      </div>
      ${parentsHtml}
    </div>

    <div class="section">
      <div class="section-title">Files (${(data.entries||[]).length})</div>
      <ul class="file-list">${fileItems || "<li style='color:#484f58;font-size:12px;padding:4px 8px'>Empty tree</li>"}</ul>
    </div>

    <div id="blob-section"></div>
  `;
}

// ================================================================
//  Load and display blob content
// ================================================================
function loadBlob(sha, path) {
  document.querySelectorAll(".file-item").forEach(el => el.classList.remove("active"));
  const el = document.querySelector(`.file-item[data-sha="${sha}"]`);
  if (el) el.classList.add("active");

  const section = document.getElementById("blob-section");
  if (!section) return;
  section.innerHTML = `<div style="padding:14px 20px;color:#484f58;font-size:12px">Loading ${esc(path)}…</div>`;

  fetch(`/api/blob/${sha}`)
    .then(r => r.json())
    .then(data => {
      section.innerHTML = `
        <div class="content-wrap">
          <div class="content-filename">${esc(path)}</div>
          <pre class="blob">${data.binary ? "(binary file)" : esc(data.content)}</pre>
        </div>`;
    })
    .catch(e => {
      section.innerHTML = `<div style="padding:14px 20px;color:#f85149">${esc(e.message)}</div>`;
    });
}

// ================================================================
//  Bootstrap: fetch graph and render
// ================================================================
fetch("/api/graph")
  .then(r => r.json())
  .then(data => {
    if (data.error) throw new Error(data.error);
    renderGraph(data);
  })
  .catch(e => {
    document.getElementById("loading").textContent = "Error: " + e.message;
  });
</script>
</body>
</html>
